<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="btnRetry" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a2020"/>
      <stop offset="100%" stop-color="#601010"/>
    </linearGradient>
    <linearGradient id="btnMenu" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a4a2a"/>
      <stop offset="100%" stop-color="#1a3a1a"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgDark)"/>

  <!-- Viñeta oscura en bordes -->
  <rect x="0" y="0" width="1280" height="720" fill="none" stroke="#000" stroke-width="120" opacity="0.5"/>

  <!-- Banda transportadora detenida (fondo) -->
  <rect x="0" y="600" width="1280" height="60" fill="#111" opacity="0.7"/>
  <line x1="0" y1="600" x2="1280" y2="600" stroke="#2a1a1a" stroke-width="2" opacity="0.6"/>
  <line x1="0" y1="660" x2="1280" y2="660" stroke="#2a1a1a" stroke-width="2" opacity="0.6"/>

  <!-- Símbolo reciclaje roto (fondo decorativo) -->
  <g transform="translate(640,310) scale(5)" opacity="0.05">
    <path d="M0,-30 L9,-14 L-9,-14 Z" fill="#ff4040" transform="rotate(0)"/>
    <path d="M0,-30 L9,-14 L-9,-14 Z" fill="#ff4040" transform="rotate(120)"/>
    <path d="M0,-30 L9,-14 L-9,-14 Z" fill="#ff4040" transform="rotate(240)"/>
  </g>

  <!-- Panel central -->
  <rect x="320" y="90" width="640" height="520" rx="20" fill="#150505" fill-opacity="0.9" stroke="#5a1a1a" stroke-width="1.5"/>

  <!-- Corazones perdidos -->
  <text x="540" y="170" font-size="38" fill="#2a0a0a" text-anchor="middle" font-family="sans-serif">♥</text>
  <text x="640" y="170" font-size="38" fill="#2a0a0a" text-anchor="middle" font-family="sans-serif">♥</text>
  <text x="740" y="170" font-size="38" fill="#2a0a0a" text-anchor="middle" font-family="sans-serif">♥</text>

  <!-- Título GAME OVER -->
  <text x="640" y="260" font-size="64" fill="#c03030" text-anchor="middle" font-family="'Arial Black', sans-serif" font-weight="900" letter-spacing="2">GAME OVER</text>

  <!-- Línea -->
  <line x1="400" y1="280" x2="880" y2="280" stroke="#3a1a1a" stroke-width="1"/>

  <!-- Mensaje -->
  <text x="640" y="320" font-size="17" fill="#806060" text-anchor="middle" font-family="sans-serif">¡Se acabaron las vidas! Inténtalo de nuevo</text>

  <!-- Cuadro de estadísticas -->
  <rect x="400" y="340" width="480" height="120" rx="10" fill="#1a0808" stroke="#3a1a1a" stroke-width="1"/>

  <text x="480" y="372" font-size="13" fill="#706060" font-family="sans-serif">PUNTUACIÓN FINAL</text>
  <text x="480" y="405" font-size="36" fill="#e04040" font-family="'Arial Black', sans-serif" font-weight="900">00000</text>

  <line x1="640" y1="350" x2="640" y2="450" stroke="#3a1a1a" stroke-width="1"/>

  <text x="740" y="372" font-size="13" fill="#706060" font-family="sans-serif">NIVEL ALCANZADO</text>
  <text x="740" y="405" font-size="36" fill="#c03030" font-family="'Arial Black', sans-serif" font-weight="900">1</text>

  <!-- Mensaje motivacional -->
  <text x="640" y="490" font-size="15" fill="#604040" text-anchor="middle" font-family="sans-serif" font-style="italic">Recuerda: separar los residuos protege el planeta</text>

  <!-- Botón REINTENTAR -->
  <rect x="390" y="510" width="220" height="58" rx="10" fill="url(#btnRetry)" stroke="#a03030" stroke-width="1.5"/>
  <text x="500" y="546" font-size="19" fill="white" text-anchor="middle" font-family="'Arial Black', sans-serif" font-weight="900">↺  REINTENTAR</text>

  <!-- Botón MENÚ -->
  <rect x="630" y="510" width="220" height="58" rx="10" fill="url(#btnMenu)" stroke="#3a6a3a" stroke-width="1.5"/>
  <text x="740" y="546" font-size="19" fill="white" text-anchor="middle" font-family="'Arial Black', sans-serif" font-weight="900">⌂  MENÚ</text>

  <!-- Créditos abajo -->
  <text x="640" y="695" font-size="13" fill="#2a1a1a" text-anchor="middle" font-family="sans-serif">EcoSort — Serious Game de Reciclaje</text>
</svg>
