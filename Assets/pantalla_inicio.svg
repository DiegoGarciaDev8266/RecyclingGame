<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <!-- Fondo degradado oscuro verde -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1a0a"/>
      <stop offset="100%" stop-color="#1a3020"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a8a40"/>
      <stop offset="100%" stop-color="#1a6a2a"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#80ff80"/>
      <stop offset="100%" stop-color="#30c050"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGrad)"/>

  <!-- Partículas decorativas de fondo -->
  <circle cx="80" cy="100" r="3" fill="#30a050" opacity="0.4"/>
  <circle cx="200" cy="60" r="2" fill="#50c070" opacity="0.3"/>
  <circle cx="1100" cy="80" r="4" fill="#30a050" opacity="0.3"/>
  <circle cx="1200" cy="200" r="2" fill="#50c070" opacity="0.4"/>
  <circle cx="150" cy="600" r="3" fill="#40b060" opacity="0.3"/>
  <circle cx="1150" cy="620" r="5" fill="#30a050" opacity="0.2"/>
  <circle cx="640" cy="30" r="3" fill="#60d080" opacity="0.3"/>
  <circle cx="900" cy="680" r="4" fill="#30a050" opacity="0.25"/>

  <!-- Banda transportadora decorativa en fondo -->
  <rect x="0" y="580" width="1280" height="60" fill="#1a2a1a" opacity="0.5"/>
  <rect x="0" y="580" width="1280" height="8" fill="#2a4a2a" opacity="0.7"/>
  <rect x="0" y="632" width="1280" height="8" fill="#2a4a2a" opacity="0.7"/>
  <!-- Dientes banda fondo -->
  <line x1="100" y1="580" x2="100" y2="640" stroke="#3a5a3a" stroke-width="2" opacity="0.4"/>
  <line x1="160" y1="580" x2="160" y2="640" stroke="#3a5a3a" stroke-width="2" opacity="0.4"/>
  <line x1="220" y1="580" x2="220" y2="640" stroke="#3a5a3a" stroke-width="2" opacity="0.4"/>
  <line x1="280" y1="580" x2="280" y2="640" stroke="#3a5a3a" stroke-width="2" opacity="0.4"/>
  <line x1="340" y1="580" x2="340" y2="640" stroke="#3a5a3a" stroke-width="2" opacity="0.4"/>
  <line x1="400" y1="580" x2="400" y2="640" stroke="#3a5a3a" stroke-width="2" opacity="0.4"/>
  <line x1="460" y1="580" x2="460" y2="640" stroke="#3a5a3a" stroke-width="2" opacity="0.4"/>
  <line x1="520" y1="580" x2="520" y2="640" stroke="#3a5a3a" stroke-width="2" opacity="0.4"/>
  <line x1="580" y1="580" x2="580" y2="640" stroke="#3a5a3a" stroke-width="2" opacity="0.4"/>
  <line x1="640" y1="580" x2="640" y2="640" stroke="#3a5a3a" stroke-width="2" opacity="0.4"/>
  <line x1="700" y1="580" x2="700" y2="640" stroke="#3a5a3a" stroke-width="2" opacity="0.4"/>
  <line x1="760" y1="580" x2="760" y2="640" stroke="#3a5a3a" stroke-width="2" opacity="0.4"/>
  <line x1="820" y1="580" x2="820" y2="640" stroke="#3a5a3a" stroke-width="2" opacity="0.4"/>
  <line x1="880" y1="580" x2="880" y2="640" stroke="#3a5a3a" stroke-width="2" opacity="0.4"/>
  <line x1="940" y1="580" x2="940" y2="640" stroke="#3a5a3a" stroke-width="2" opacity="0.4"/>
  <line x1="1000" y1="580" x2="1000" y2="640" stroke="#3a5a3a" stroke-width="2" opacity="0.4"/>
  <line x1="1060" y1="580" x2="1060" y2="640" stroke="#3a5a3a" stroke-width="2" opacity="0.4"/>
  <line x1="1120" y1="580" x2="1120" y2="640" stroke="#3a5a3a" stroke-width="2" opacity="0.4"/>
  <line x1="1180" y1="580" x2="1180" y2="640" stroke="#3a5a3a" stroke-width="2" opacity="0.4"/>

  <!-- Símbolo de reciclaje gigante decorativo (fondo) -->
  <g transform="translate(640,310) scale(4.5)" opacity="0.06">
    <path d="M0,-30 L9,-14 L-9,-14 Z" fill="#50ff70" transform="rotate(0)"/>
    <path d="M0,-30 L9,-14 L-9,-14 Z" fill="#50ff70" transform="rotate(120)"/>
    <path d="M0,-30 L9,-14 L-9,-14 Z" fill="#50ff70" transform="rotate(240)"/>
  </g>

  <!-- Panel central -->
  <rect x="340" y="100" width="600" height="460" rx="20" fill="#0f2a15" fill-opacity="0.85" stroke="#2a6a3a" stroke-width="1.5"/>

  <!-- Símbolo de reciclaje decorativo pequeño arriba -->
  <g transform="translate(640,160) scale(1.8)">
    <path d="M0,-24 L8,-10 L-8,-10 Z" fill="#50e070" transform="rotate(0)"/>
    <path d="M0,-24 L8,-10 L-8,-10 Z" fill="#50e070" transform="rotate(120)"/>
    <path d="M0,-24 L8,-10 L-8,-10 Z" fill="#50e070" transform="rotate(240)"/>
    <circle cx="0" cy="0" r="6" fill="#0f2a15"/>
  </g>

  <!-- Título principal -->
  <text x="640" y="250" font-size="72" fill="url(#titleGrad)" text-anchor="middle" font-family="'Arial Black', sans-serif" font-weight="900" letter-spacing="4">EcoSort</text>

  <!-- Subtítulo -->
  <text x="640" y="295" font-size="18" fill="#60c080" text-anchor="middle" font-family="sans-serif" letter-spacing="6">SERIOUS GAME DE RECICLAJE</text>

  <!-- Línea divisoria -->
  <line x1="440" y1="315" x2="840" y2="315" stroke="#2a6a3a" stroke-width="1"/>

  <!-- Descripción -->
  <text x="640" y="355" font-size="16" fill="#80b890" text-anchor="middle" font-family="sans-serif">Arrastra cada residuo al cesto correcto</text>
  <text x="640" y="378" font-size="16" fill="#80b890" text-anchor="middle" font-family="sans-serif">antes de que se acabe el tiempo</text>

  <!-- Íconos de cestos mini -->
  <rect x="470" y="400" width="50" height="40" rx="4" fill="#2060a0" stroke="#4090c0" stroke-width="1.5"/>
  <text x="495" y="426" font-size="11" fill="white" text-anchor="middle" font-family="sans-serif" font-weight="bold">CARTÓN</text>

  <rect x="540" y="400" width="50" height="40" rx="4" fill="#208050" stroke="#40b070" stroke-width="1.5"/>
  <text x="565" y="426" font-size="11" fill="white" text-anchor="middle" font-family="sans-serif" font-weight="bold">VIDRIO</text>

  <rect x="610" y="400" width="60" height="40" rx="4" fill="#a09020" stroke="#c0b030" stroke-width="1.5"/>
  <text x="640" y="426" font-size="11" fill="white" text-anchor="middle" font-family="sans-serif" font-weight="bold">PLÁSTICO</text>

  <!-- Corazones -->
  <text x="720" y="428" font-size="18" fill="#e04040" text-anchor="middle" font-family="sans-serif">♥♥♥</text>

  <!-- Botón Jugar -->
  <rect x="490" y="470" width="300" height="60" rx="12" fill="url(#btnGrad)" stroke="#40c060" stroke-width="2"/>
  <text x="640" y="508" font-size="24" fill="white" text-anchor="middle" font-family="'Arial Black', sans-serif" font-weight="900" letter-spacing="3">▶  JUGAR</text>

  <!-- Créditos -->
  <text x="640" y="690" font-size="13" fill="#3a6a4a" text-anchor="middle" font-family="sans-serif">Serious Game — Educación Ambiental</text>
</svg>
